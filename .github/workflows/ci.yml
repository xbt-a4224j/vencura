name: CI

# Quality gate on every push to main (we commit directly to main — no PR gate, §11).
# Also runs on PRs targeting main for safety. semantic-release tags versions after verify passes.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so commitlint can lint the pushed range

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Commitlint
        if: github.event_name == 'push'
        run: |
          base='${{ github.event.before }}'
          if [ "$base" = "0000000000000000000000000000000000000000" ]; then base='HEAD~1'; fi
          pnpm exec commitlint --from "$base" --to '${{ github.sha }}'

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # Gated DB integration tests (CC-6): exercise the REAL Postgres advisory lock + the policy
  # daily-limit race against an ephemeral Postgres. The mock-based `verify` job can't catch a
  # regression in the actual serialization primitive (the DEVLOG records two such bugs that
  # slipped the mock suite), so we run the RUN_DB_TESTS-gated specs here on every push.
  db-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vencura
          POSTGRES_PASSWORD: vencura
          POSTGRES_DB: vencura
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vencura"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://vencura:vencura@localhost:5432/vencura?schema=public
      RPC_URL: http://localhost:8545
      RUN_DB_TESTS: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # Foundry provides `anvil` for the happy-path e2e (create → fund → send → confirmed).
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Start anvil
        run: anvil --host 0.0.0.0 --chain-id 31337 &

      - name: Install
        run: pnpm install --frozen-lockfile

      # The int specs import @vencura/shared (resolved from its dist). The verify job
      # builds it transitively via turbo (^build), but this job runs vitest directly,
      # so build the workspace dep explicitly first.
      - name: Build shared
        run: pnpm --filter @vencura/shared build

      - name: Migrate
        run: pnpm --filter @vencura/api exec prisma migrate deploy

      # --no-file-parallelism: the lock spec's ordering assertion is timing-sensitive, so the
      # DB specs must not run concurrently against the shared Postgres.
      - name: DB integration + e2e tests
        run: >-
          pnpm --filter @vencura/api exec vitest run --no-file-parallelism
          test/infra/lock/pg-advisory-lock.int.spec.ts
          test/transactions/policy-race.int.spec.ts
          test/transactions/happy-path.e2e.spec.ts

  release:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create tags + GitHub releases
      issues: write # comment on released issues
      pull-requests: write # comment on released PRs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
